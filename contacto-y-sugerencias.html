            </ul>
        </nav>

    <main class="paging-especial">
        <h1><i><u>Formulario:</u></i></h1>

        <form id="miFormulario" action="https://formcarry.com/s/-TWjE_vDo7h" method="post" enctype="multipart/form-data">
            
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Nombre:</label>
                    <input type="text" class="form-control" name="nombre" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido:</label>
                    <input type="text" class="form-control" name="apellido" required>
                </div>
            </div>


            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Género:</label>
                    <select class="form-select" name="genero" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="Hombre">Hombre</option>
                        <option value="Mujer">Mujer</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo electrónico:</label>
                    <input type="email" class="form-control" name="correo" required>
                </div>
            </div>


            <div class="row mb-4">
                <label class="form-label">Sugerencias:</label>
                <textarea class= "form-control" name="comentario" placeholder="Dejá tu comentario"
                maxlength="150" required></textarea>
            </div>

            <div class="mb-5">
                <label class="form-label">Adjuntar archivo (opcional):</label>
                <input type="file" class="form-control" name="file" accept="image/*,.pdf,.doc,.docx,.txt,.jpg,.png">
            </div>


            <fieldset class="border p-4 rounded mb-4">
                <legend class="float-none w-auto px-3 fs-5 text-secondary fw-semibold">Datos Opcionales</legend>

                <div class="row g-4 mb-4">
                    <div class="col-md-8 col-12">
                        <label for="dir" class="form-label">Dirección:</label>
                        <input type="text" class="form-control" id="dir" name="direccion">
                    </div>
                    <div class="col-md-4 col-12">
                        <label for="nro" class="form-label">Nro:</label>
                        <input type="text" class="form-control" id="nro" name="numero">
                    </div>
                    <div class="col-md-4 col-12">
                        <label for="cp" class="form-label">Código postal:</label>
                        <input type="text" class="form-control" id="cp" name="codigo_postal">
                    </div>
                    <div class="col-md-4 col-12">
                        <label for="tel" class="form-label">Teléfono:</label>
                        <input type="text" class="form-control" id="tel" name="telefono">
                    </div>
                    <div class="col-md-4 col-12">
                        <label for="cel" class="form-label">Celular:</label>
                        <input type="text" class="form-control" id="cel" name="celular">
                    </div>
                </div>
            </fieldset>

            <div class="row">
                <div class="col-12 d-flex gap-3 justify-content-end conten-bootes">
                    <input type="reset" class="btn btn-secondary rounded-pill px-4" value="Borrar">
                    <input type="submit" class="btn btn-success rounded-pill px-5 shadow-sm" value="Enviar">
                </div>
            </div>

            <div id="cartelExito"
                style="display: none; margin-top: 15px; padding: 10px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px;">
                ¡Formulario enviado con éxito! Gracias por contactarnos.
            </div>

        </form>

    </main>
